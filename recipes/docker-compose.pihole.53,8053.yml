services:
  pihole:
    image: pihole/pihole
    container_name: pihole
    environment:
      TZ: ${TZ:-UTC}
      WEBPASSWORD: ${WEBPASSWORD:-password}
    volumes:
      - pihole-etc:/etc/pihole
      - pihole-dnsmasq:/etc/dnsmasq.d
    labels:
      - "lazy-tcp-proxy.enabled=true"
      # Port 53 requires elevated privileges on Linux - you may need to set
      # net.ipv4.ip_unprivileged_port_start=53 or run the proxy as root
      - "lazy-tcp-proxy.ports=53:53,8053:80"

volumes:
  pihole-etc:
  pihole-dnsmasq:
