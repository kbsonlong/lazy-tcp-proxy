services:
  lazy-tcp-proxy:
    build: ./lazy-tcp-proxy
    container_name: lazy-tcp-proxy
    image: mountainpass/lazy-tcp-proxy
    environment:
      - DOCKER_SOCK=/var/run/docker.sock
      - POLL_INTERVAL_SECS=10
      - IDLE_TIMEOUT_SECS=30
      # - STATUS_PORT=8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
      - "9000-9099:9000-9099"
    restart: always

  